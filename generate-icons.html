<!DOCTYPE html>
<html>
<head><title>Save App Icons</title></head>
<body style="font-family:sans-serif;text-align:center;padding:40px;">
<h1>Social Stars App Icons</h1>
<p>Right-click (or long-press on iPad) each image and choose <strong>"Save Image As"</strong></p>

<h3>icon-192.png (for Apple Touch Icon)</h3>
<canvas id="c192" width="192" height="192" style="border:1px solid #ccc;border-radius:20px;"></canvas>

<h3>icon-512.png (for PWA)</h3>
<canvas id="c512" width="512" height="512" style="border:1px solid #ccc;border-radius:40px;max-width:300px;"></canvas>

<script>
var img = new Image();
img.onload = function() {
    [["c192",192],["c512",512]].forEach(function(pair) {
        var c = document.getElementById(pair[0]);
        var ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0, pair[1], pair[1]);
    });
};
img.src = "icon.svg";
</script>
</body>
</html>
