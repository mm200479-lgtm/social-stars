<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each image below and "Save Image As" to create your app icons:</p>
<h3>192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
    var ctx = canvas.getContext("2d");
    var s = canvas.width;
    // Background
    ctx.fillStyle = "#6c63ff";
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.2);
    ctx.fill();
    // Star emoji
    ctx.font = (s * 0.55) + "px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("\u2B50", s/2, s/2);
}
drawIcon(document.getElementById("c192"));
drawIcon(document.getElementById("c512"));

// Auto-download as PNG
["c192","c512"].forEach(function(id) {
    var c = document.getElementById(id);
    var link = document.createElement("a");
    link.download = "icon-" + c.width + ".png";
    link.href = c.toDataURL("image/png");
    // Don't auto-click, let user save manually
});
</script>
</body>
</html>
